plugins {
    id 'java'
    id 'application'
    id 'com.gradleup.shadow' version '9.3.1'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        // Ensures the project uses Java 17
        languageVersion = JavaLanguageVersion.of(17)
    }
}

// Tells Gradle your code is in 'src' and not 'src/main/java'
sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
}

repositories {
    mavenCentral()
}

// Minimal dependencies for CS2113
//dependencies {
//    testImplementation platform('org.junit:junit-bom:5.10.0')
//    testImplementation 'org.junit.jupiter:junit-jupiter'
//}

application {
    // Replace 'Lukas' with your actual main class name if different
    mainClass = 'Lukas'
}

// Connects your keyboard to the IntelliJ console so Scanner(System.in) works
run {
    standardInput = System.in
}

shadowJar {
    archiveBaseName.set('Lukas')
    archiveClassifier.set('')
    archiveVersion.set('')

}

